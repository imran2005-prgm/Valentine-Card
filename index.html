<!doctype html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valentine Card &amp; Week Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;family=Great+Vibes&amp;display=swap"
    rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
    }

    .font-script {
      font-family: 'Great Vibes', cursive;
    }

    .font-elegant {
      font-family: 'Playfair Display', serif;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(5deg);
      }
    }

    @keyframes pulse-heart {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    @keyframes sparkle {

      0%,
      100% {
        opacity: 0;
        transform: scale(0);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .floating-heart {
      animation: float 4s ease-in-out infinite;
    }

    .pulse-heart {
      animation: pulse-heart 1.5s ease-in-out infinite;
    }

    .sparkle {
      animation: sparkle 2s ease-in-out infinite;
    }

    .sparkle:nth-child(2) {
      animation-delay: 0.3s;
    }

    .sparkle:nth-child(3) {
      animation-delay: 0.6s;
    }

    .sparkle:nth-child(4) {
      animation-delay: 0.9s;
    }

    .sparkle:nth-child(5) {
      animation-delay: 1.2s;
    }

    .slide-in {
      animation: slideIn 0.4s ease-out;
    }

    @keyframes pageFlip {
      0% {
        opacity: 0;
        transform: rotateY(90deg);
      }

      50% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
        transform: rotateY(0deg);
      }
    }

    @keyframes fadeInContent {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes heartBounce {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      25% {
        transform: translateY(-10px) scale(1.1);
      }

      50% {
        transform: translateY(0) scale(1);
      }
    }

    .book-page-content {
      animation: fadeInContent 0.6s ease-out;
    }

    .page-flip {
      animation: pageFlip 0.6s ease-in-out;
    }

    .heart-bounce {
      animation: heartBounce 0.8s ease-in-out;
    }
  </style>
  <style>
    @view-transition {
      navigation: auto;
    }
  </style>
</head>

<body class="h-full m-0 p-0">
  <div id="app-wrapper" class="h-full w-full overflow-auto flex flex-col"
    style="background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 50%, #fbcfe8 100%);"><!-- Navigation Tabs -->

          <path

        </svg>
        <svg class="floating-heart absolute bottom-32 left-20 w-10 h-10 text-pink-400 opacity-40"

        </svg>
        <svg class="floating-heart absolute top-40 left-1/4 w-5 h-5 text-red-300 opacity-50"
          style="animation-delay: 0.5s;" viewbox="0 0 24 24" fill="currentColor">
          <path

        </svg>
        <svg class="floating-heart absolute bottom-20 right-16 w-7 h-7 text-pink-500 opacity-45"

      </div><!-- Main Card -->

        <div class="h-2" style="background: linear-gradient(90deg, #f43f5e, #ec4899, #f43f5e);"></div>
        <!-- Card Content -->

          <div class="absolute top-8 right-8 sparkle">
            ✨
          </div>
          <div class="absolute top-20 left-12 sparkle">
            ✨
          </div>

          </div>
          <div class="absolute bottom-12 left-8 sparkle">

            </svg>

          <h2 id="recipient" class="font-script text-4xl mb-6" style="color: #be123c;">My Wifey</h2>
          <!-- Decorative Divider -->

              <path

            </svg>

          </div><!-- Main Message -->

            my heart skip a beat every single day. Thank you for being my everything.</p><!-- From Line -->
          <p class="font-elegant text-rose-400 text-lg mb-1">With all my love,</p>
          <h3 id="sender" class="font-script text-3xl" style="color: #be123c;">Forever Yours</h3><!-- Bottom Hearts -->

            <svg class="w-4 h-4 text-pink-300" viewbox="0 0 24 24" fill="currentColor">

            </svg>
            <svg class="w-5 h-5 text-rose-400" viewbox="0 0 24 24" fill="currentColor">

      </div>
    </div><!-- Book Page -->
    <div id="book-page" class="hidden flex-1 flex flex-col p-6">
      <div class="max-w-6xl mx-auto w-full h-full flex flex-col">
        <h1 class="font-script text-4xl text-center mb-8" style="color: #be123c;">📖 Valentine Week Book</h1>
        <!-- Book Container -->
        <div class="flex-1 flex items-center justify-center">
          <div class="relative w-full max-w-5xl" style="perspective: 1000px;"><!-- Book Background -->
            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden"
              style="background: linear-gradient(135deg, #fffbfc 0%, #fff5f7 100%);"><!-- Page Navigation -->
              <div class="flex items-center justify-between p-8 border-b-2" style="border-color: #fbcfe8;"><button
                  id="prev-btn"
                  class="px-6 py-2 rounded-lg font-elegant text-lg font-semibold transition-all hover:shadow-lg"
                  style="background: #f43f5e; color: white;"> ← Previous </button>
                <div class="text-center">
                  <p class="font-elegant text-3xl" style="color: #be123c;" id="page-number">Page 1</p>
                  <p class="font-script text-2xl" style="color: #ec4899;" id="page-title">Rose Day</p>
                </div><button id="next-btn"
                  class="px-6 py-2 rounded-lg font-elegant text-lg font-semibold transition-all hover:shadow-lg"
                  style="background: #f43f5e; color: white;"> Next → </button>
              </div><!-- Content Area -->
              <div class="p-12 min-h-96 flex flex-col items-center justify-center relative overflow-hidden">
                <!-- Page Content -->
                <div id="page-content" class="w-full text-center book-page-content">
                  <!-- Content will be inserted here -->

                  class="quick-nav-dot w-3 h-3 rounded-full transition-all cursor-pointer" style="background: #f43f5e;"
                  data-page="0"></button> <button
                  class="quick-nav-dot w-3 h-3 rounded-full transition-all cursor-pointer" style="background: #fbcfe8;"
                  data-page="1"></button> <button
                  class="quick-nav-dot w-3 h-3 rounded-full transition-all cursor-pointer" style="background: #fbcfe8;"
                  data-page="2"></button> <button
                  class="quick-nav-dot w-3 h-3 rounded-full transition-all cursor-pointer" style="background: #fbcfe8;"
                  data-page="3"></button> <button
                  class="quick-nav-dot w-3 h-3 rounded-full transition-all cursor-pointer" style="background: #fbcfe8;"
                  data-page="4"></button> <button
                  class="quick-nav-dot w-3 h-3 rounded-full transition-all cursor-pointer" style="background: #fbcfe8;"
                  data-page="5"></button> <button
                  class="quick-nav-dot w-3 h-3 rounded-full transition-all cursor-pointer" style="background: #fbcfe8;"
                  data-page="6"></button> <button
                  class="quick-nav-dot w-3 h-3 rounded-full transition-all cursor-pointer" style="background: #fbcfe8;"
                  data-page="7"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    let currentData = [];
    let currentPage = 0;

    const valentinePages = [
      {
        day: "Rose Day",
        date: "February 7",
        emoji: "🌹",
        description: "A day to express your love through the beautiful language of flowers.",
        activity: "Gift your loved one a red rose and express your deepest feelings.",
        color: "#dc2626"
      },
      {
        day: "Propose Day",
        date: "February 8",
        emoji: "💍",
        description: "The perfect day to take a leap of faith and ask the important question. Will you be my Wife ?",
        activity: "A special moment and propose to your loved one in a meaningful way.",
        color: "#db2777"
      },
      {
        day: "Chocolate Day",
        date: "February 9",
        emoji: "🍫",
        description: "Sweeten our relationship with the sweetness of chocolate. But I'm sorry I can't be there with you to celebrate this day.",
        /* activity: "Share your favorite chocolates and sweet moments together.", */
        color: "#92400e"
      },
      {
        day: "Teddy Day",
        date: "February 10",
        emoji: "🧸",
        description: "Our affection with a cuddly companion that symbolizes care and warmth.",
        /* activity: "Gift a teddy bear as a symbol of your comfort and support.", */
        color: "#b45309"
      },
      {
        day: "Promise Day",
        date: "February 11",
        emoji: "🤝",
        description: "Make meaningful promises to cherish and support each other forever.",
        activity: "Write down your promises and share them with your special someone.",
        color: "#3b82f6"
      },
      /* {
        day: "Hug Day",
        date: "February 12",
        emoji: "🤗",
        description: "Celebrate the warmth of togetherness with a heartfelt hug.",
        activity: "Share warm hugs and feel the connection that binds you together.",
        color: "#f59e0b"
      },
      {
        day: "Kiss Day",
        date: "February 13",
        emoji: "💋",
        description: "Express your love through the most intimate gesture of affection.",
        activity: "Share a romantic moment that celebrates your love and connection.",
        color: "#ec4899"
      },
      {
        day: "Valentine's Day",
        date: "February 14",
        emoji: "💕",
        description: "The ultimate celebration of love, where all moments become memories.",
        activity: "Spend the day creating unforgettable memories with your loved one.",
        color: "#f43f5e"
      } */
    ];

    const defaultConfig = {
      recipient_name: "My Wife",
      main_message: "You make my heart skip a beat every single day. Thank you for being my everything.",
      sender_name: "Forever Yours",
      background_color: "#fdf2f8",
      card_color: "#ffffff",
      text_color: "#9f1239",
      accent_color: "#be123c",
      highlight_color: "#f43f5e",
      font_family: "Playfair Display",
      font_size: 16
    };

    // Tab switching
    document.getElementById('card-tab').addEventListener('click', () => {
      document.getElementById('card-page').classList.remove('hidden');
      document.getElementById('book-page').classList.add('hidden');
      document.getElementById('card-tab').style.background = '#f43f5e';
      document.getElementById('card-tab').style.color = 'white';
      document.getElementById('book-tab').style.background = 'transparent';
      document.getElementById('book-tab').style.color = '#be123c';
    });

    document.getElementById('book-tab').addEventListener('click', () => {
      document.getElementById('card-page').classList.add('hidden');
      document.getElementById('book-page').classList.remove('hidden');
      document.getElementById('card-tab').style.background = 'transparent';
      document.getElementById('card-tab').style.color = '#be123c';
      document.getElementById('book-tab').style.background = '#f43f5e';
      document.getElementById('book-tab').style.color = 'white';
      renderPage(currentPage);
    });

    // Render current page
    function renderPage(pageNum) {
      const page = valentinePages[pageNum];
      const content = document.getElementById('page-content');

      // Clear animation class
      content.classList.remove('page-flip');

      // Update page info
      document.getElementById('page-number').textContent = `Page ${pageNum + 1}`;
      document.getElementById('page-title').textContent = page.day;

      // Create content with animation
      content.innerHTML = `
        <div style="max-width: 400px;">
          <div class="text-8xl mb-6 heart-bounce">${page.emoji}</div>
          <h2 class="font-script text-5xl mb-4" style="color: ${page.color};">${page.day}</h2>
          <p class="font-elegant text-lg mb-6" style="color: #9f1239;">${page.date}</p>
          
          <div class="bg-gradient-to-br rounded-2xl p-8 mb-8" style="background: linear-gradient(135deg, ${page.color}20 0%, ${page.color}10 100%); border: 2px solid ${page.color}30;">
            <p class="font-elegant text-xl mb-6 leading-relaxed" style="color: #9f1239;">
              ${page.description}
            </p>
            
            <div class="bg-white rounded-lg p-6 border-l-4" style="border-color: ${page.color};">
              <p class="font-elegant text-sm mb-2" style="color: #9f1239;">💭 Activity:</p>
              <p class="text-lg font-script" style="color: ${page.color};">${page.activity}</p>
            </div>
          </div>
        </div>
      `;

      // Trigger animation
      content.classList.add('page-flip');

      // Update navigation buttons
      document.getElementById('prev-btn').disabled = pageNum === 0;
      document.getElementById('next-btn').disabled = pageNum === valentinePages.length - 1;

      document.getElementById('prev-btn').style.opacity = pageNum === 0 ? '0.5' : '1';
      document.getElementById('next-btn').style.opacity = pageNum === valentinePages.length - 1 ? '0.5' : '1';

      // Update dots
      document.querySelectorAll('.quick-nav-dot').forEach((dot, idx) => {
        dot.style.background = idx === pageNum ? '#f43f5e' : '#fbcfe8';
        dot.style.width = idx === pageNum ? '12px' : '12px';
      });
    }

    // Navigation
    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage--;
        renderPage(currentPage);
      }
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (currentPage < valentinePages.length - 1) {
        currentPage++;
        renderPage(currentPage);
      }
    });

    // Quick navigation dots
    document.querySelectorAll('.quick-nav-dot').forEach(dot => {
      dot.addEventListener('click', (e) => {
        const page = parseInt(e.target.dataset.page);
        currentPage = page;
        renderPage(currentPage);
      });
    });

    async function onConfigChange(config) {
      const recipientEl = document.getElementById('recipient');
      const messageEl = document.getElementById('message');
      const senderEl = document.getElementById('sender');

      if (recipientEl) {
        recipientEl.textContent = config.recipient_name || defaultConfig.recipient_name;
        recipientEl.style.color = config.accent_color || defaultConfig.accent_color;
      }

      if (messageEl) {
        messageEl.textContent = config.main_message || defaultConfig.main_message;
        messageEl.style.color = config.text_color || defaultConfig.text_color;
        const baseSize = config.font_size || defaultConfig.font_size;
        messageEl.style.fontSize = `${baseSize * 1.25}px`;
        const customFont = config.font_family || defaultConfig.font_family;
        messageEl.style.fontFamily = `${customFont}, serif`;
      }

      if (senderEl) {
        senderEl.textContent = config.sender_name || defaultConfig.sender_name;
        senderEl.style.color = config.accent_color || defaultConfig.accent_color;
      }
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.card_color || defaultConfig.card_color,
            set: (value) => {
              config.card_color = value;
              window.elementSdk.setConfig({ card_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => {
              config.accent_color = value;
              window.elementSdk.setConfig({ accent_color: value });
            }
          },
          {
            get: () => config.highlight_color || defaultConfig.highlight_color,
            set: (value) => {
              config.highlight_color = value;
              window.elementSdk.setConfig({ highlight_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            config.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => {
            config.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ["recipient_name", config.recipient_name || defaultConfig.recipient_name],
        ["main_message", config.main_message || defaultConfig.main_message],
